apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: system-upgrade

resources:
  - https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/crd.yaml
  - https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/system-upgrade-controller.yaml
  - upgrade-plans.yaml

patches:
  - target: 
      kind: Plan
    patch: |-
      - op: add
        path: /spec/version
        value: v1.35.2+k3s1
